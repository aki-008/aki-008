name: Metrics
on:
  schedule:
    - cron: "0 */3 * * *" # Runs every 3 hours
  workflow_dispatch: # Allows manual run

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cycle GIF in README
        shell: python
        run: |
          import os

          # Your complete list of GIFs in the root directory
          gif_list = [
              "chainsaw-man.gif",
              "fish-gif-fish.gif",
              "golden-forest.gif",
              "jp-autumn.gif",
              "jp-sky.gif",
              "rain.gif",
              "shirne-maiden.gif",
              "torii-gate.gif"
          ]

          readme_file = "README.md"

          if os.path.exists(readme_file):
              with open(readme_file, "r", encoding="utf-8") as f:
                  content = f.read()
              
              # Find the current GIF and replace it with the next one in the list
              for i, gif in enumerate(gif_list):
                  if gif in content:
                      next_gif = gif_list[(i + 1) % len(gif_list)]
                      content = content.replace(gif, next_gif)
                      break
              
              with open(readme_file, "w", encoding="utf-8") as f:
                  f.write(content)

      - name: Commit and push updated README
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: cycle README gif"
          git push

      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: aki-008
          template: classic

          # Core options
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Calcutta

          # Plugins
          plugin_introduction: yes
          plugin_introduction_title: yes

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_ignored: Jupyter Notebook, HTML, TeX
          plugin_languages_limit: 12
          plugin_languages_threshold: 0%
          plugin_languages_details: bytes-size
          plugin_languages_sections: most-used
          plugin_languages_categories: markup, programming
          plugin_languages_recent_load: 300
          plugin_languages_recent_days: 14

          plugin_lines: yes
          plugin_lines_sections: base
          plugin_lines_repositories_limit: 4

          plugin_repositories: yes
          plugin_repositories_pinned: 6
          plugin_repositories_order: featured, pinned, starred, random

          plugin_traffic: yes
